name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages on every push to main.
# The build runs `check:data` first (see package.json), so bad data blocks the
# deploy. Uses the committed data/seed/ — no vendor:fetch / import needed here.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GitHub Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
