name: CI

# Validates pull requests: data integrity check + a full static build. No
# deploy here — that happens on merge to main (see deploy.yml). Once branch
# protection requires this check, a bad re-import or override can't merge.

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check data integrity
        run: npm run check:data
      - name: Build site
        run: npm run build
